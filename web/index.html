<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAP — Traffic Alert Photographer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #080b12;
  --surface:    #0e1420;
  --surface2:   #131c2e;
  --surface3:   #1a2440;
  --border:     #1e2d47;
  --border2:    #243354;
  --accent:     #3b82f6;
  --accent-glow:#3b82f620;
  --text:       #e2e8f0;
  --text-dim:   #64748b;
  --text-mid:   #94a3b8;
  --green:      #10b981;
  --green-dim:  #10b98120;
  --red:        #f43f5e;
  --red-dim:    #f43f5e20;
  --amber:      #f59e0b;
  --amber-dim:  #f59e0b20;
  --blue:       #3b82f6;
  --blue-dim:   #3b82f620;
  --purple:     #8b5cf6;
  --purple-dim: #8b5cf620;

  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ───────────────────────────────────────────────────────────────── */

header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
}

header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
  opacity: .4;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-logo {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #1d4ed8, #3b82f6);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.brand-logo svg { width: 15px; height: 15px; }

.brand-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .5px;
  color: var(--text);
}
.brand-sub {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: .3px;
}

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: livepulse 2.5s ease-in-out infinite;
  margin-left: 4px;
}
@keyframes livepulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
  50%       { opacity: .5; box-shadow: 0 0 3px var(--green); }
}

.hspacer { flex: 1; }

.stat-group {
  display: flex;
  gap: 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px 4px;
}

.stat-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 5px;
  font-size: 12px;
}
.stat-pill.active { background: var(--surface3); }
.stat-pill .s-label { color: var(--text-dim); }
.stat-pill .s-val {
  font-weight: 700;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}
.stat-pill.s-incidents .s-val { color: var(--text); }
.stat-pill.s-snaps     .s-val { color: var(--blue); }
.stat-pill.s-confirmed .s-val { color: var(--green); }

.last-refresh {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ── Toolbar ──────────────────────────────────────────────────────────────── */

.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.search-wrap {
  position: relative;
  flex-shrink: 0;
}
.search-wrap svg {
  position: absolute;
  left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
}
.toolbar input[type=text] {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 7px;
  padding: 6px 10px 6px 30px;
  font-size: 12px;
  font-family: var(--font);
  width: 240px;
  outline: none;
  transition: border-color .15s;
}
.toolbar input[type=text]:focus { border-color: var(--accent); }
.toolbar input[type=text]::placeholder { color: var(--text-dim); }

.toolbar select {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 7px;
  padding: 6px 10px;
  font-size: 12px;
  font-family: var(--font);
  outline: none;
  cursor: pointer;
  transition: border-color .15s;
}
.toolbar select:focus { border-color: var(--accent); }

.toggle-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: var(--bg);
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.toggle-pill input { display: none; }
.toggle-pill:has(input:checked) {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}
.toggle-pill .toggle-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.toggle-pill:has(input:checked) .toggle-dot::after {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
}

.list-count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}

/* ── Layout ───────────────────────────────────────────────────────────────── */

.layout {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── List panel ───────────────────────────────────────────────────────────── */

#list-panel {
  width: 400px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--surface);
}

.incident-item {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
  position: relative;
  border-left: 3px solid transparent;
}
.incident-item:hover   { background: var(--surface2); }
.incident-item.active  { background: var(--surface2); border-left-color: var(--accent); }

/* severity left-edge tinting */
.incident-item[data-sev="Major"]  { border-left-color: var(--red); }
.incident-item[data-sev="Major"].active { border-left-color: var(--red); }
.incident-item[data-sev="Moderate"] { border-left-color: var(--amber); }

.item-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 5px;
}

.item-badges { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }

.item-time {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
  flex-shrink: 0;
  padding-top: 1px;
}

.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .4px;
  white-space: nowrap;
}

.badge-type-roadwork              { background: #0f2640; color: #60a5fa; border: 1px solid #1e4a7a; }
.badge-type-accidentsAndIncidents { background: #280d0d; color: #f87171; border: 1px solid #5a1f1f; }
.badge-type-closures              { background: #1e1030; color: #c084fc; border: 1px solid #3d2060; }
.badge-type-specialEvents         { background: #0d2618; color: #4ade80; border: 1px solid #1a4f30; }
.badge-type-generalInfo           { background: #221a08; color: #fbbf24; border: 1px solid #4a3a10; }
.badge-type-winterDrivingIndex    { background: #0d1f33; color: #7dd3fc; border: 1px solid #1a4060; }
.badge-type-unknown               { background: #1a1a1a; color: #64748b; border: 1px solid #2a2a2a; }

.badge-sev-Major    { background: #280d0d; color: #f43f5e; border: 1px solid #5a1f1f; }
.badge-sev-Moderate { background: #221a08; color: #f59e0b; border: 1px solid #4a3a10; }
.badge-sev-Minor    { background: #221a08; color: #fbbf24; border: 1px solid #3a2e0e; }

.item-roadway {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.item-desc {
  font-size: 12px;
  color: var(--text-mid);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 7px;
  line-height: 1.4;
}

.item-footer {
  display: flex;
  align-items: center;
  gap: 10px;
}

.item-cam-stat {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-dim);
}
.item-cam-stat svg { opacity: .5; }
.item-cam-stat.confirmed { color: var(--green); }
.item-cam-stat.confirmed svg { opacity: 1; }

/* ── Detail panel ─────────────────────────────────────────────────────────── */

#detail-panel {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  gap: 12px;
}
.empty-state .empty-icon {
  width: 56px; height: 56px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim);
}
.empty-state p { font-size: 13px; color: var(--text-dim); }

/* Detail header bar */
.detail-hero {
  padding: 22px 28px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.detail-hero .hero-badges { display: flex; gap: 6px; margin-bottom: 10px; }

.detail-hero h2 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -.3px;
  color: var(--text);
  margin-bottom: 4px;
}

.detail-hero .hero-sub {
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 10px;
}
.detail-hero .hero-sub .sep { opacity: .3; }

/* Stats strip */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  border-bottom: 1px solid var(--border);
}

.stat-box {
  padding: 14px 20px;
  border-right: 1px solid var(--border);
}
.stat-box:last-child { border-right: none; }
.stat-box .sb-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--text-dim);
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.stat-box .sb-val {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.stat-box .sb-val.green { color: var(--green); }
.stat-box .sb-val.mono {
  font-family: var(--mono);
  font-size: 13px;
}

/* Body padding wrapper */
.detail-body {
  padding: 24px 28px;
}

/* Description */
.desc-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border2);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 24px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-mid);
}

/* Section headers */
.section-hd {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.section-hd-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-dim);
}
.section-hd-count {
  font-size: 11px;
  font-weight: 600;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-mid);
  padding: 1px 7px;
  border-radius: 10px;
}
.section-hd-line { flex: 1; height: 1px; background: var(--border); }

/* Camera grid */
.cameras-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 16px;
  margin-bottom: 8px;
}

.camera-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color .15s;
}
.camera-card:hover { border-color: var(--border2); }
.camera-card.verdict-yes     { border-color: #1a4a35; }
.camera-card.verdict-uncertain { border-color: #3d2e0a; }

.cam-img-wrap {
  position: relative;
  background: #040609;
  aspect-ratio: 16/9;
  overflow: hidden;
  cursor: pointer;
}
.cam-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .3s;
}
.cam-img-wrap:hover img { transform: scale(1.02); }
.cam-img-wrap .no-snap {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; color: var(--text-dim); font-size: 12px;
}

/* Verdict overlay badge */
.verdict-badge {
  position: absolute;
  top: 10px; right: 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 5px;
  backdrop-filter: blur(8px);
  display: flex; align-items: center; gap: 5px;
}
.verdict-badge.yes       { background: rgba(16,185,129,.9); color: #fff; }
.verdict-badge.no        { background: rgba(30,45,70,.9);   color: #94a3b8; border: 1px solid #2e4570; }
.verdict-badge.uncertain { background: rgba(245,158,11,.85); color: #fff; }

/* Distance badge */
.dist-badge {
  position: absolute;
  bottom: 10px; left: 10px;
  font-size: 10px;
  font-weight: 600;
  font-family: var(--mono);
  padding: 3px 8px;
  border-radius: 4px;
  background: rgba(8,11,18,.8);
  border: 1px solid rgba(255,255,255,.1);
  color: var(--text-mid);
  backdrop-filter: blur(4px);
}

/* Camera info */
.cam-info { padding: 12px 14px 14px; }

.cam-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}
.cam-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.cam-id {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text-dim);
  flex-shrink: 0;
  padding-top: 2px;
}

.cam-chips {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.chip {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .4px;
  border: 1px solid transparent;
}
.chip-conf-high     { background: var(--green-dim);  color: var(--green);  border-color: #1a4a35; }
.chip-conf-medium   { background: var(--amber-dim);  color: var(--amber);  border-color: #4a3510; }
.chip-conf-low      { background: var(--red-dim);    color: var(--red);    border-color: #4a1020; }
.chip-quality-good     { background: var(--blue-dim);   color: var(--blue);   border-color: #1a3a6a; }
.chip-quality-poor     { background: var(--amber-dim);  color: var(--amber);  border-color: #4a3510; }
.chip-quality-unusable { background: var(--red-dim);    color: var(--red);    border-color: #4a1020; }

.cam-evidence {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}
.ev-tag {
  font-size: 11px;
  background: var(--green-dim);
  border: 1px solid #1a4a35;
  color: var(--green);
  padding: 2px 8px;
  border-radius: 4px;
}

.cam-ai-summary {
  font-size: 12px;
  color: var(--text-mid);
  line-height: 1.6;
  padding-top: 9px;
  border-top: 1px solid var(--border);
}

/* No cameras */
.no-cameras {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 24px;
}

/* Lightbox */
#lightbox {
  display: none;
  position: fixed; inset: 0;
  background: rgba(4, 6, 12, .92);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
  backdrop-filter: blur(6px);
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 95vw; max-height: 90vh;
  border-radius: 8px;
  box-shadow: 0 32px 80px rgba(0,0,0,.8);
  border: 1px solid var(--border);
}

/* No results */
.no-results {
  padding: 40px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}

/* Footer */
footer {
  flex-shrink: 0;
  padding: 7px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}
footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }
.footer-disclaimer { font-size: 10px; opacity: .6; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">TAP</div>
      <div class="brand-sub">Traffic Alert Photographer</div>
    </div>
  </div>

  <div class="live-dot"></div>

  <div class="hspacer"></div>

  <div class="last-refresh">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    <span id="refresh-time">—</span>
  </div>

  <div class="stat-group">
    <div class="stat-pill s-incidents">
      <span class="s-label">Incidents</span>
      <span class="s-val" id="stat-incidents">—</span>
    </div>
    <div class="stat-pill s-snaps">
      <span class="s-label">Snapshots</span>
      <span class="s-val" id="stat-snaps">—</span>
    </div>
    <div class="stat-pill s-confirmed">
      <span class="s-label">AI Confirmed</span>
      <span class="s-val" id="stat-visible">—</span>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Search roadway, description…">
  </div>

  <select id="filter-type">
    <option value="">All types</option>
    <option value="accidentsAndIncidents">Accidents &amp; Incidents</option>
    <option value="closures">Closures</option>
    <option value="winterDrivingIndex">Winter Driving</option>
    <option value="roadwork">Roadwork</option>
    <option value="specialEvents">Special Events</option>
    <option value="generalInfo">General Info</option>
  </select>

  <select id="filter-sev">
    <option value="">All severities</option>
    <option value="Major">Major</option>
    <option value="Moderate">Moderate</option>
    <option value="Minor">Minor</option>
    <option value="None">None</option>
  </select>

  <label class="toggle-pill">
    <input type="checkbox" id="filter-visible">
    <span class="toggle-dot"></span>
    AI confirmed only
  </label>

  <div class="list-count" id="list-count"></div>
</div>

<div class="layout">
  <div id="list-panel"></div>
  <div id="detail-panel">
    <div class="empty-state">
      <div class="empty-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <p>Select an incident to view details</p>
    </div>
  </div>
</div>

<div id="lightbox"><img id="lightbox-img" src="" alt=""></div>

<footer>
  <span>Data source: <a href="https://www.511NY.org" target="_blank" rel="noopener">511NY</a> (NYSDOT) — TAP is not affiliated with or endorsed by 511NY or NYSDOT.</span>
  <span class="footer-disclaimer">Data provided "as is" with no warranty. Accuracy subject to change. Actual conditions may vary.</span>
</footer>

<script>
  let allIncidents = [];
  let activeId = null;

  // ── Fetch ─────────────────────────────────────────────────────────────────

  async function loadIncidents() {
    try {
      const res = await fetch('/api/incidents');
      allIncidents = await res.json();
      updateStats();
      renderList();
      document.getElementById('refresh-time').textContent =
        new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'});
    } catch(e) {
      console.error('Failed to load incidents', e);
    }
  }

  async function loadDetail(id) {
    const res = await fetch(`/api/incidents/${encodeURIComponent(id)}`);
    if (!res.ok) return;
    renderDetail(await res.json());
  }

  function updateStats() {
    document.getElementById('stat-incidents').textContent = allIncidents.length;
    document.getElementById('stat-snaps').textContent =
      allIncidents.reduce((s, i) => s + (i.snapshot_count || 0), 0);
    document.getElementById('stat-visible').textContent =
      allIncidents.reduce((s, i) => s + (i.visible_count || 0), 0);
  }

  // ── Filter ────────────────────────────────────────────────────────────────

  function filtered() {
    const q       = document.getElementById('search').value.toLowerCase();
    const type    = document.getElementById('filter-type').value;
    const sev     = document.getElementById('filter-sev').value;
    const visOnly = document.getElementById('filter-visible').checked;
    return allIncidents.filter(i => {
      if (type && i.event_type !== type) return false;
      if (sev  && i.severity   !== sev)  return false;
      if (visOnly && !i.visible_count)   return false;
      if (q && !`${i.roadway} ${i.description}`.toLowerCase().includes(q)) return false;
      return true;
    });
  }

  ['search','filter-type','filter-sev','filter-visible'].forEach(id =>
    document.getElementById(id).addEventListener('input', renderList)
  );

  // ── Helpers ───────────────────────────────────────────────────────────────

  function typeBadge(t) {
    const labels = {
      accidentsAndIncidents: 'Accident',
      roadwork: 'Roadwork',
      closures: 'Closure',
      specialEvents: 'Special Event',
      generalInfo: 'Info',
      winterDrivingIndex: 'Winter',
      transitMode: 'Transit',
    };
    const label = labels[t] || (t || 'Unknown');
    return `<span class="badge badge-type-${t || 'unknown'}">${label}</span>`;
  }

  function sevBadge(s) {
    if (!s || s === 'None' || s === 'Unknown') return '';
    return `<span class="badge badge-sev-${s}">${s}</span>`;
  }

  function timeAgo(iso) {
    if (!iso) return '—';
    const m = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (m <  1) return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h/24)}d ago`;
  }

  const camIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`;
  const checkIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;

  // ── List ──────────────────────────────────────────────────────────────────

  function renderList() {
    const items = filtered();
    const panel = document.getElementById('list-panel');
    document.getElementById('list-count').textContent =
      items.length < allIncidents.length
        ? `${items.length} of ${allIncidents.length}`
        : `${items.length} incidents`;

    if (!items.length) {
      panel.innerHTML = '<div class="no-results">No incidents match the current filter.</div>';
      return;
    }

    panel.innerHTML = items.map(i => {
      const confirmed = (i.visible_count || 0) > 0;
      return `
        <div class="incident-item${i.id === activeId ? ' active' : ''}"
             data-id="${i.id}" data-sev="${i.severity || ''}">
          <div class="item-top">
            <div class="item-badges">
              ${typeBadge(i.event_type)}
              ${sevBadge(i.severity)}
            </div>
            <span class="item-time">${timeAgo(i.first_seen)}</span>
          </div>
          <div class="item-roadway">${i.roadway || i.id}</div>
          <div class="item-desc">${i.description || '—'}</div>
          <div class="item-footer">
            <span class="item-cam-stat">
              ${camIcon} ${i.snapshot_count || 0} snapshot${i.snapshot_count !== 1 ? 's' : ''}
            </span>
            ${confirmed ? `<span class="item-cam-stat confirmed">${checkIcon} ${i.visible_count} confirmed</span>` : ''}
          </div>
        </div>`;
    }).join('');

    panel.querySelectorAll('.incident-item').forEach(el =>
      el.addEventListener('click', () => {
        activeId = el.dataset.id;
        panel.querySelectorAll('.incident-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        loadDetail(activeId);
      })
    );
  }

  // ── Detail ────────────────────────────────────────────────────────────────

  function renderDetail(d) {
    const panel = document.getElementById('detail-panel');

    const confirmedCount  = (d.cameras || []).filter(c => c.ai_visible === 1).length;
    const uncertainCount  = (d.cameras || []).filter(c => c.ai_visible === null).length;

    const cams = (d.cameras || []).map(c => {
      const snapSrc = c.snapshot_path
        ? `/incidents/${encodeURIComponent(d.id)}/${c.snapshot_path}` : null;

      const verdictCls   = c.ai_visible === 1 ? 'yes' : c.ai_visible === null ? 'uncertain' : 'no';
      const verdictLabel = c.ai_visible === 1 ? '✓ Confirmed' : c.ai_visible === null ? '? Uncertain' : '✗ Not Visible';

      const imgHtml = snapSrc
        ? `<img src="${snapSrc}" alt="${c.camera_name || ''}" loading="lazy">`
        : `<div class="no-snap">
             <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
             <span>No snapshot</span>
           </div>`;

      const evidenceTags = (c.ai_evidence || []).map(e =>
        `<span class="ev-tag">${e}</span>`
      ).join('');

      return `
        <div class="camera-card verdict-${verdictCls}">
          <div class="cam-img-wrap"${snapSrc ? ` data-src="${snapSrc}"` : ''}>
            ${imgHtml}
            <div class="verdict-badge ${verdictCls}">${verdictLabel}</div>
            ${c.distance_km != null ? `<div class="dist-badge">${c.distance_km.toFixed(3)} km</div>` : ''}
          </div>
          <div class="cam-info">
            <div class="cam-header">
              <div class="cam-name">${c.camera_name || c.camera_id}</div>
              <div class="cam-id">${c.camera_id}</div>
            </div>
            <div class="cam-chips">
              ${c.ai_confidence    ? `<span class="chip chip-conf-${c.ai_confidence}">${c.ai_confidence} confidence</span>` : ''}
              ${c.ai_image_quality ? `<span class="chip chip-quality-${c.ai_image_quality}">img: ${c.ai_image_quality}</span>` : ''}
            </div>
            ${evidenceTags ? `<div class="cam-evidence">${evidenceTags}</div>` : ''}
            ${c.ai_summary ? `<div class="cam-ai-summary">${c.ai_summary}</div>` : ''}
          </div>
        </div>`;
    }).join('');

    panel.innerHTML = `
      <div class="detail-hero">
        <div class="hero-badges">
          ${typeBadge(d.event_type)}
          ${sevBadge(d.severity)}
        </div>
        <h2>${d.roadway || d.id}</h2>
        <div class="hero-sub">
          <span>${d.id}</span>
          ${d.direction ? `<span class="sep">·</span><span>${d.direction}</span>` : ''}
        </div>
      </div>

      <div class="stats-strip">
        <div class="stat-box">
          <div class="sb-label">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            First Seen
          </div>
          <div class="sb-val" style="font-size:13px">${d.first_seen ? new Date(d.first_seen).toLocaleString() : '—'}</div>
        </div>
        <div class="stat-box">
          <div class="sb-label">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Last Updated
          </div>
          <div class="sb-val" style="font-size:13px">${d.last_updated || '—'}</div>
        </div>
        <div class="stat-box">
          <div class="sb-label">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Coordinates
          </div>
          <div class="sb-val mono">${d.lat?.toFixed(5)}, ${d.lon?.toFixed(5)}</div>
        </div>
        <div class="stat-box">
          <div class="sb-label">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            Cameras
          </div>
          <div class="sb-val">${d.cameras?.length || 0} checked</div>
        </div>
        <div class="stat-box">
          <div class="sb-label">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            AI Verdict
          </div>
          <div class="sb-val ${confirmedCount > 0 ? 'green' : ''}">
            ${confirmedCount} confirmed${uncertainCount > 0 ? `, ${uncertainCount} uncertain` : ''}
          </div>
        </div>
      </div>

      <div class="detail-body">
        ${d.description ? `<div class="desc-block">${d.description}</div>` : ''}

        ${d.cameras?.length ? `
          <div class="section-hd">
            <span class="section-hd-title">Camera Views</span>
            <span class="section-hd-count">${d.cameras.length}</span>
            <span class="section-hd-line"></span>
          </div>
          <div class="cameras-grid">${cams}</div>
        ` : `
          <div class="no-cameras">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            No active cameras found within the configured search radius for this incident.
          </div>
        `}
      </div>`;

    panel.querySelectorAll('.cam-img-wrap[data-src]').forEach(wrap =>
      wrap.addEventListener('click', () => {
        document.getElementById('lightbox-img').src = wrap.dataset.src;
        document.getElementById('lightbox').classList.add('open');
      })
    );
  }

  document.getElementById('lightbox').addEventListener('click', () =>
    document.getElementById('lightbox').classList.remove('open')
  );

  loadIncidents();
  setInterval(loadIncidents, 30000);
</script>
</body>
</html>
